<!DOCTYPE HTML>
<html>

<head>
  <title>BattleButBot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" type="text/css" href="index.css">
</head>

<body style="overflow: hidden;">
  <div id="container" class="controller">
    <h4 style="text-align: center; padding-top: 1em; color: white;">&#x1F579; BattleButBot Controller</h4>
    <div id="joystick-left" style="position: absolute; width: 280px; height: 280px; left: 10px; top: 1em;">
    </div>
    <div id="joystick-right" style="position: absolute; width: 280px; height: 280px; right: 10px; top: 1em;">
    </div>
    <button id="config" class="btn main"
      style="position: absolute; bottom: 2em; left: 50%; transform: translate(-50%, 0);">
      <h6>Settings</h6>
    </button>
    <!-- Debug only -->
    <div id="console" style="position: absolute; bottom: 1em; left: 1em; font-size: 0.6rem;">
      &#x2139; CONSOLE
    </div>
  </div>
</body>

<script>
  // Joy Stick Library

  // Necessary variables
  var oldX = 0, oldY = 0, newX = 0, newY = 0;
  var isRequestOnGoing = false;
  const JOYSTICK_OFFSET = 10;
  const JOYTSTICK_REQUEST_INTERVAL = 0.05; // 50ms

  window.onload = function () {
    // Get page elements on load
    var log = document.getElementById("console");
    const config = document.getElementById("config");

    /* ------------------- Page orientation --------------------- */

    // Evaluate the orietation of the screen when the page loads.
    showOrHidePage(0);

    function showOrHidePage(_) {
      const elements = document.getElementById("container").children;
      if (window.matchMedia("(orientation: portrait)").matches) {
        // Portrait
        for (let element of elements) {
          element.style.visibility = 'hidden';
        }
        alert("Please turn your phone horizontally!");
      } else if (window.matchMedia("(orientation: landscape)").matches) {
        for (let element of elements) {
          element.style.visibility = 'visible';
        }
      }
    };
    window.addEventListener('resize', showOrHidePage);
    config.addEventListener('click', e => {
      if (isRequestOnGoing) {
        alert("There is an ongoing commmunication");
        return;
      }
      window.location.href = 'config';
    });

    /* ------------------- Joystick handling --------------------- */

    const JoyLeft = new JoyStick('joystick-left', {}, function (thumb) {
      newY = thumb.y;
    });
    const JoyRight = new JoyStick('joystick-right', {}, function (thumb) {
      newX = thumb.x;
    });

    function _sendXandYToDevice() {
      if (isRequestOnGoing) {
        return;
      }
      if (
        (Math.abs(oldX - newX) > JOYSTICK_OFFSET) ||
        (Math.abs(oldY - newY) > JOYSTICK_OFFSET)
      ) {
        oldX = newX;
        oldY = newY;

        _request("/update?x=" + newX + "&y=" + newY);
      }
    }

    // Attempt to send the speed and the direction every 50ms
    setInterval(() => { _sendXandYToDevice(); }, JOYTSTICK_REQUEST_INTERVAL);

    /* ------------------- Utils --------------------- */

    function _request(path) {
      isRequestOnGoing = true;
      const xhr = new XMLHttpRequest();
      xhr.onload = () => {
        log.innerText = xhr.status == 200 ? path + ' OK' : "404";
        isRequestOnGoing = false;
      };
      xhr.ontimeout = () => {
        isRequestOnGoing = false;
        log.innerText = "Timeout on XML request!";
      };
      xhr.onerror = () => {
        isRequestOnGoing = false;
        log.innerText = "Error on XML request!";
      };
      xhr.open("GET", path, true);
      xhr.send();
    }
  }
</script>

</html>
